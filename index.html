<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYRA — Sovereign Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300;400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --surface: #0e1318; --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07); --accent: #7ee8c4; --text: #e8eaf0;
    --muted: #5a6070; --special: #ff8fab; --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; transition: all 0.6s ease; overflow-x: hidden; }

  /* Background Mesh & Grain */
  .bg-mesh { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 20% 10%, rgba(126,232,196,0.05), transparent 50%), radial-gradient(circle at 80% 80%, rgba(167,139,250,0.05), transparent 50%); }

  .app { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; }

  /* Fixed Avatar Container */
  .avatar-section { display: flex; flex-direction: column; align-items: center; gap: 15px; }
  .avatar-wrap { position: relative; width: 150px; height: 150px; }
  .avatar-ring { position: absolute; inset: -5px; border-radius: 50%; background: conic-gradient(from 0deg, var(--accent), transparent, var(--accent)); animation: spin 4s linear infinite; opacity: 0.5; }
  
  .avatar-face {
    position: absolute; inset: 0; border-radius: 50%; background: #000;
    overflow: hidden; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }

  #avatarImg { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
  .avatar-wrap.thinking #avatarImg { animation: breathe 3s infinite ease-in-out; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  /* UI Elements */
  .speech-bubble { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: var(--radius); backdrop-filter: blur(10px); }
  .speech-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; line-height: 1.4; }
  
  .camera-panel { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  #cameraFeed { width: 100%; height: 100%; object-fit: cover; }

  .input-area { display: flex; gap: 10px; }
  input { flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #fff; font-family: inherit; }
  button { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }

  .mode-toggle { display: flex; gap: 10px; justify-content: center; }
  .mode-btn { background: var(--glass); color: var(--muted); padding: 8px 15px; border: 1px solid var(--border); border-radius: 20px; font-size: 10px; }
  .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
</style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="app">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnNorm" onclick="setMode('normal')">NORMAL</button>
      <button class="mode-btn" id="btnSpec" onclick="setMode('special')">SPECIAL</button>
    </div>

    <div class="avatar-section">
      <div class="avatar-wrap" id="avWrap">
        <div class="avatar-ring"></div>
        <div class="avatar-face">
          <img src="roman-holoschchuk-KAPRQjlSzCA-unsplash.jpg" id="avatarImg">
        </div>
      </div>
      <h1 style="font-family: 'Syne'; letter-spacing: 5px;">LYRA</h1>
    </div>

    <div class="speech-bubble">
      <p class="speech-text" id="speechOut">I'm listening, Pioneer.</p>
    </div>

    <div class="camera-panel">
      <video id="cameraFeed" autoplay playsinline></video>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Command Lyra..." onkeypress="if(event.key==='Enter') send()">
      <button onclick="send()">SEND</button>
    </div>
  </div>

  <script>
    let currentMode = 'normal';

    function setMode(m) {
      currentMode = m;
      document.getElementById('btnNorm').classList.toggle('active', m === 'normal');
      document.getElementById('btnSpec').classList.toggle('active', m === 'special');
    }

    async function send() {
      const input = document.getElementById('userInput');
      const text = input.value;
      if(!text) return;
      
      input.value = '';
      document.getElementById('avWrap').classList.add('thinking');

      try {
        const response = await fetch('http://localhost:3000/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ prompt: text, mode: currentMode })
        });
        const data = await response.json();
        document.getElementById('speechOut').innerText = data.reply;
      } catch (e) {
        document.getElementById('speechOut').innerText = "Local core offline.";
      } finally {
        document.getElementById('avWrap').classList.remove('thinking');
      }
    }

    navigator.mediaDevices.getUserMedia({video: true}).then(s => {
      document.getElementById('cameraFeed').srcObject = s;
    });
  </script>
</body>
</html>
