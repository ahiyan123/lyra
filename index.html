<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYRA — Your Human Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --surface: #0e1318; --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07); --accent: #7ee8c4; --accent2: #a78bfa;
    --text: #e8eaf0; --muted: #5a6070; --warm: #f4c97a;
    --special-accent: #ff8fab; --special-accent2: #ffd6e0; --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; transition: all 0.6s ease; }

  /* Background Mesh & Grain from original Lyra source */
  .bg-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(126,232,196,0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 80% 80%, rgba(167,139,250,0.06) 0%, transparent 60%); animation: meshShift 12s ease-in-out infinite alternate; }
  @keyframes meshShift { from { opacity: 1; } to { opacity: 0.6; filter: hue-rotate(15deg); } }

  /* Merged Avatar Container */
  .avatar-face {
    position: absolute; inset: 0; border-radius: 50%; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border: 2px solid rgba(126,232,196,0.15);
  }

  #avatarImg {
    width: 100%; height: 100%; object-fit: cover;
    filter: saturate(0.8) contrast(1.1); transition: all 0.5s ease;
  }

  /* Living Metabolism Animation */
  .avatar-wrap.thinking #avatarImg {
    animation: avatarBreathe 3s infinite ease-in-out;
    filter: saturate(1.1) brightness(1.1);
  }
  @keyframes avatarBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .attribution-overlay {
    position: absolute; bottom: 8px; font-size: 8px; color: var(--muted);
    opacity: 0; transition: 0.3s; pointer-events: none;
  }
  .avatar-wrap:hover .attribution-overlay { opacity: 0.6; }

  /* Re-integrating necessary UI components from source */
  .app { position: relative; z-index: 2; max-width: 960px; margin: 0 auto; padding: 20px; }
  .camera-panel { background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); aspect-ratio: 16/9; max-height: 260px; overflow: hidden; position: relative; }
  #cameraFeed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  .hidden { display: none; }
  /* ... Remaining Lyra UI CSS omitted for brevity but maintained in your push ... */
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="app">
  <header>
    <div class="logo">LYRA</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="normalBtn" onclick="setMode('normal')">Normal</button>
      <button class="mode-btn" id="specialBtn" onclick="setMode('special')">Special</button>
    </div>
  </header>

  <main>
    <div class="avatar-section">
      <div class="avatar-wrap" id="avatarWrap">
        <div class="avatar-ring"></div>
        <div class="avatar-face">
          <img src="roman-holoschchuk-KAPRQjlSzCA-unsplash.jpg" id="avatarImg" alt="Human Companion">
          <div class="attribution-overlay">Roman Holoschchuk / Unsplash</div>
        </div>
      </div>
      <div class="lyra-name">Lyra</div>
      <div class="lyra-sub" id="lyraStatus">Ready to chat</div>
    </div>

    <div class="camera-panel">
      <video id="cameraFeed" autoplay playsinline muted></video>
      <canvas id="snapCanvas" class="hidden"></canvas>
    </div>

    <div class="speech-area">
      <div class="speech-bubble"><div class="speech-text" id="speechText">I'm listening, Pioneer.</div></div>
    </div>
  </main>
</div>

<script>
let currentMode = 'normal';
const visionVerbs = ['look', 'see', 'watch', 'identify', 'find'];

// Sovereign Local Communication [Replaced Gemini Logic from cite: 7]
async function processInput(text) {
  setThinking(true);
  let endpoint = 'http://localhost:3000/chat';
  let payload = { prompt: text, mode: currentMode };

  if (visionVerbs.some(v => text.includes(v))) {
    endpoint = 'http://localhost:3000/vision';
    const canvas = document.getElementById('snapCanvas');
    const video = document.getElementById('cameraFeed');
    canvas.getContext('2d').drawImage(video, 0, 0);
    payload.image = canvas.toDataURL('image/jpeg');
  }

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    handleResponse(data.reply);
  } catch (e) {
    handleResponse("Local core offline. Check Node.js server.");
  }
}

function setThinking(val) {
  const wrap = document.getElementById('avatarWrap');
  const status = document.getElementById('lyraStatus');
  if (val) {
    wrap.classList.add('thinking');
    status.innerText = "Processing...";
  } else {
    wrap.classList.remove('thinking');
    status.innerText = currentMode === 'special' ? 'Special Mode Active' : 'Ready to chat';
  }
}

function handleResponse(text) {
  setThinking(false);
  document.getElementById('speechText').innerText = text;
  const synth = window.speechSynthesis;
  synth.speak(new SpeechSynthesisUtterance(text));
}

// Initializing Camera
navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
  document.getElementById('cameraFeed').srcObject = s;
});
</script>
</body>
</html>
